name: tracker_tournament

description: Free Fire Tournament App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.2

  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.0.0
  firebase_storage: ^13.0.0
  firebase_messaging: ^16.0.0

  google_sign_in: ^7.0.0
  shared_preferences: ^2.5.3
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  carousel_slider: ^5.1.1
  share_plus: ^12.0.0
  url_launcher: ^6.3.2
  uuid: ^4.5.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/banners/
    - assets/icons/
    - assets/logos/